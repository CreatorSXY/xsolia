<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Browse Validation Topics · xSolia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/theme.css?v=20260424-gsap">
  <style>
    .filter-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .filter-pill {
      border-radius: 999px;
      border: 1px solid #d5cabb;
      background: #fbf7f2;
      color: #5f544a;
      padding: 0.35rem 0.85rem;
      font-size: 0.8rem;
      font-weight: 600;
      transition: all 170ms ease;
    }

    .filter-pill:hover {
      border-color: #c7633c;
      color: #9f4320;
    }

    .filter-pill-active {
      background: #1f1b18;
      color: #f8f2ea;
      border-color: #1f1b18;
    }

    .topic-list {
      border: 1px solid #d8cec2;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.56);
      padding: 0.2rem 1rem;
    }

    .topic-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      align-items: center;
      padding: 1rem 0;
      border-bottom: 1px solid rgba(214, 205, 194, 0.75);
    }

    .topic-item:last-child {
      border-bottom: none;
    }

    .topic-heading {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      color: #231e1a;
    }

    .topic-description {
      margin-top: 0.35rem;
      margin-bottom: 0.35rem;
      color: #564b42;
      font-size: 0.87rem;
    }

    .topic-meta {
      color: #7a6e62;
      font-size: 0.79rem;
    }

    .topic-chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      border: 1px solid #d9c8b6;
      padding: 0.14rem 0.5rem;
      background: #fcf3ea;
      color: #8b4f2d;
      font-size: 0.72rem;
      margin-right: 0.34rem;
      margin-top: 0.15rem;
    }

    .trending-strip {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(220px, 280px);
      gap: 0.75rem;
      overflow-x: auto;
      padding-bottom: 0.2rem;
    }

    .trending-card {
      border: 1px solid #d8cec2;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.66);
      padding: 0.75rem;
      min-height: 138px;
    }

    .trending-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: #231e1a;
      line-height: 1.25;
      margin: 0;
    }

    .trending-meta {
      font-size: 0.76rem;
      color: #7a6e62;
      margin-top: 0.45rem;
    }

    @media (max-width: 760px) {
      .topic-item {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body class="min-h-screen flex flex-col">
  <div id="navbar">
    <header class="x-nav sticky top-0 z-50">
      <div class="container h-full flex items-center justify-between gap-4 py-3">
        <a href="index.html" class="flex items-center gap-2">
          <div
            style="
              width: 32px;
              height: 32px;
              border-radius: 999px;
              background: linear-gradient(135deg, #dd8f62, #c7633c);
              display: flex;
              align-items: center;
              justify-content: center;
              font-weight: 700;
              color: #fff;
            "
          >
            k
          </div>
          <div>
            <div class="site-logo-text">xSolia</div>
            <div class="site-subtitle">Validation workspace</div>
          </div>
        </a>

        <div class="flex-1 flex items-center justify-end gap-4">
          <form
            id="navSearchForm"
            class="hidden md:flex items-center gap-2"
            style="max-width: 260px; width: 100%;"
          >
            <input
              id="navSearchInput"
              type="search"
              class="x-input"
              placeholder="Search topics…"
              style="padding-right: 2.2rem;"
            />
            <button
              type="submit"
              style="
                margin-left: -2.1rem;
                font-size: 0.8rem;
                color: #9ca3af;
              "
            >
              🔍
            </button>
          </form>

          <div
            id="userInfo"
            class="flex items-center gap-2"
            style="font-size: 0.8rem; color: #6b7280;"
          >
            <div
              id="userAvatar"
              style="
                width: 28px;
                height: 28px;
                border-radius: 999px;
                background: linear-gradient(135deg, #d58f66, #c7633c);
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 600;
                color: #fff;
                text-transform: uppercase;
              "
            >
              ?
            </div>
            <div class="flex flex-col">
              <span id="userNameLabel">Guest</span>
              <span id="userRoleLabel" style="font-size: 0.7rem; color: #9ca3af;">Not signed in</span>
            </div>
          </div>
        </div>
      </div>
    </header>
  </div>

  <main class="flex-1 container workspace-shell" style="padding-top:1.7rem; padding-bottom:2rem;">
    <section class="workspace-hero motion-reveal">
      <h1 style="font-size:1.55rem; line-height:1.1; margin:0; font-weight:800; color:#1f1b18;">Active Validation Topics</h1>
      <p style="font-size:0.9rem; color:#6e6259; margin-top:0.42rem; max-width:58ch;">
        Scan open projects, pick one aligned with your experience, and submit practical feedback in minutes.
      </p>
    </section>

    <section id="trendingSection" class="section motion-reveal" style="margin-top:0.95rem;">
      <div class="flex items-center justify-between gap-2" style="margin-bottom:0.5rem;">
        <h2 style="font-size:1rem; font-weight:800; margin:0;">Trending</h2>
        <span style="font-size:0.75rem; color:#74685d;">Last 7 days + overall signal</span>
      </div>
      <div id="trendingContainer" class="trending-strip"></div>
    </section>

    <section class="section motion-reveal" style="margin-top:1.05rem;">
      <div class="flex flex-wrap items-end justify-between gap-2" style="margin-bottom:0.45rem;">
        <div style="font-size:0.78rem; color:#74685d;">Filter by domain</div>
        <div>
          <label for="projectSort" style="font-size:0.75rem; color:#74685d; margin-right:0.35rem;">Sort</label>
          <select id="projectSort" class="x-input" style="display:inline-flex; width:auto; min-width:140px; padding:0.32rem 0.6rem; font-size:0.78rem;">
            <option value="new">Newest</option>
            <option value="active">Most active</option>
          </select>
        </div>
      </div>
      <div id="categoryFilters" class="filter-wrap">
        <button type="button" class="filter-pill filter-pill-active" data-main="">All</button>
        <button type="button" class="filter-pill" data-main="digital">Digital</button>
        <button type="button" class="filter-pill" data-main="physical">Physical</button>
        <button type="button" class="filter-pill" data-main="service">Service</button>
        <button type="button" class="filter-pill" data-main="education">Education</button>
        <button type="button" class="filter-pill" data-main="health">Health</button>
        <button type="button" class="filter-pill" data-main="testing">Legacy testing</button>
      </div>
    </section>

    <section class="section motion-reveal" style="margin-top:1rem;">
      <div id="projectsContainer" class="topic-list"></div>
      <p id="emptyHint" class="hidden" style="font-size:0.9rem; color:#8f8276; margin-top:0.75rem;">
        No topics under this filter.
      </p>
      <p id="error" class="hidden" style="font-size:0.9rem; color:#b1492c; margin-top:0.75rem;"></p>
    </section>
  </main>

  <footer style="text-align:center; padding:1.5rem 0; font-size:0.75rem; color:var(--ink-faint);">
    © 2026 xSolia
  </footer>

  <script src="js/app.js?v=20260424-gsap"></script>
  <script src="js/logo.js"></script>
  <script src="js/nav.js"></script>
  <script>
    const session = XsoliaApp.getSession();

    const SUBCATEGORY_LABELS = {
      software: "Software & digital tools",
      clothing: "Clothing & accessories",
      daily_use: "Daily-use products",
      other: "Other",
      digital_consumer_app: "Consumer apps",
      digital_productivity_tool: "Productivity & knowledge tools",
      digital_dev_tool: "Developer tools / APIs",
      digital_b2b_saas: "B2B SaaS",
      digital_ai_product: "AI-powered products",
      digital_game_entertainment: "Games & entertainment",
      physical_clothing: "Clothing & accessories",
      physical_home_living: "Home & living",
      physical_gadgets: "Gadgets & small hardware",
      physical_stationery: "Stationery & study supplies",
      physical_food_beverage: "Food & beverage",
      physical_outdoor_sports: "Outdoor & sports gear",
      service_local: "Local services",
      service_travel_experience: "Travel & experiences",
      service_on_demand: "On-demand services",
      service_consulting: "Consulting",
      service_subscription: "Subscription services",
      edu_online_course: "Online courses",
      edu_tutoring_coaching: "Tutoring & coaching",
      edu_learning_tool: "Learning tools",
      edu_creator_tool: "Creator tools",
      edu_community: "Communities",
      health_fitness: "Fitness",
      health_nutrition: "Nutrition",
      health_sleep: "Sleep & recovery",
      health_mental: "Mental wellbeing",
      health_habit: "Habit building",
    };

    const initialParams = new URLSearchParams(window.location.search);
    let allProjects = [];
    const respondedProjectIds = new Set();
    let currentMainCategory = "";
    const filters = {
      q: (initialParams.get("q") || "").trim(),
      sort: ((initialParams.get("sort") || "new").trim().toLowerCase() || "new"),
    };
    const RESPONDED_CACHE_KEY = "xsolia_responded_projects_cache_v1";
    const RESPONDED_CACHE_TTL_MS = 5 * 60 * 1000;

    const container = document.getElementById("projectsContainer");
    const emptyHint = document.getElementById("emptyHint");
    const errorEl = document.getElementById("error");
    const sortSelectEl = document.getElementById("projectSort");
    const trendingSection = document.getElementById("trendingSection");
    const trendingContainer = document.getElementById("trendingContainer");

    if (!["new", "active"].includes(filters.sort)) {
      filters.sort = "new";
    }
    if (sortSelectEl) {
      sortSelectEl.value = filters.sort;
      sortSelectEl.addEventListener("change", async () => {
        filters.sort = sortSelectEl.value || "new";
        const params = new URLSearchParams(window.location.search);
        if (filters.sort === "new") params.delete("sort");
        else params.set("sort", filters.sort);
        const query = params.toString();
        window.history.replaceState({}, "", query ? `${window.location.pathname}?${query}` : window.location.pathname);
        await fetchProjects();
      });
    }

    function getSubcategoryLabel(subcategory) {
      if (!subcategory) return "";
      return SUBCATEGORY_LABELS[subcategory] || subcategory.replaceAll("_", " ");
    }

    function renderInterestStars(avgInterest) {
      const value = Number(avgInterest || 0);
      if (!Number.isFinite(value) || value <= 0) return "No ratings yet";
      const rounded = Math.max(1, Math.min(5, Math.round(value)));
      return `${"★".repeat(rounded)}${"☆".repeat(Math.max(0, 5 - rounded))} ${value.toFixed(1)}/5`;
    }

    function matchesCategory(project, mainCategory) {
      if (!mainCategory) return true;
      if ((project.main_category || "") === mainCategory) return true;
      if (mainCategory === "testing") return (project.main_category || "") === "testing";
      const subcategory = project.subcategory || "";
      return subcategory.startsWith(`${mainCategory}_`);
    }

    function createTopicItem(project) {
      const wrapper = document.createElement("article");
      wrapper.className = "topic-item motion-reveal";

      const left = document.createElement("div");

      const title = document.createElement("h2");
      title.className = "topic-heading";
      title.textContent = project.title || "Untitled topic";

      const desc = document.createElement("p");
      desc.className = "topic-description";
      desc.textContent = project.description || "No description provided.";

      const chips = document.createElement("div");
      const mainChip = document.createElement("span");
      mainChip.className = "topic-chip";
      mainChip.textContent = project.main_category || "testing";
      chips.appendChild(mainChip);
      if (project.visibility === "tester_only") {
        const visibilityChip = document.createElement("span");
        visibilityChip.className = "topic-chip";
        visibilityChip.textContent = "Tester-only";
        chips.appendChild(visibilityChip);
      }

      const subcategoryLabel = getSubcategoryLabel(project.subcategory);
      if (subcategoryLabel) {
        const subChip = document.createElement("span");
        subChip.className = "topic-chip";
        subChip.textContent = subcategoryLabel;
        chips.appendChild(subChip);
      }

      const meta = document.createElement("div");
      meta.className = "topic-meta";
      const questionCount = Array.isArray(project.questions) ? project.questions.length : 0;
      meta.textContent = `Target: ${project.target_audience || "Not specified"} · Questions: ${questionCount} · Budget: $${project.budget || 0}`;

      let respondedChip = null;
      if (respondedProjectIds.has(project.id)) {
        respondedChip = document.createElement("span");
        respondedChip.className = "x-badge";
        respondedChip.style.marginTop = "0.45rem";
        respondedChip.style.display = "inline-flex";
        respondedChip.textContent = "✓ Responded";
      }

      const imageUrls = Array.isArray(project.image_urls) ? project.image_urls : [];
      let preview = null;
      if (imageUrls.length > 0) {
        preview = document.createElement("div");
        preview.style.margin = "0.45rem 0";

        const image = document.createElement("img");
        image.src = imageUrls[0];
        image.alt = `${project.title || "Topic"} preview`;
        image.style.width = "min(210px, 100%)";
        image.style.height = "96px";
        image.style.objectFit = "cover";
        image.style.borderRadius = "10px";
        image.style.border = "1px solid rgba(42,39,34,0.16)";
        image.style.display = "block";
        preview.appendChild(image);
      }

      left.appendChild(title);
      left.appendChild(desc);
      if (preview) left.appendChild(preview);
      left.appendChild(chips);
      left.appendChild(meta);
      if (respondedChip) left.appendChild(respondedChip);

      const action = document.createElement("a");
      if (respondedProjectIds.has(project.id)) {
        action.href = "tester-dashboard.html";
        action.className = "x-btn-secondary";
        action.style.fontSize = "0.82rem";
        action.textContent = "View history";
      } else {
        action.href = `answer.html?project_id=${project.id}`;
        action.className = "x-btn-primary";
        action.style.fontSize = "0.82rem";
        action.textContent = "Answer";
      }

      wrapper.appendChild(left);
      wrapper.appendChild(action);
      return wrapper;
    }

    function createTrendingCard(project) {
      const card = document.createElement("article");
      card.className = "trending-card motion-reveal";

      const title = document.createElement("h3");
      title.className = "trending-title";
      title.textContent = project.title || "Untitled topic";

      const categoryChip = document.createElement("span");
      categoryChip.className = "topic-chip";
      categoryChip.textContent = project.main_category || "testing";

      const responseMeta = document.createElement("p");
      responseMeta.className = "trending-meta";
      const responsesCount = Number(project.responses_count || 0);
      responseMeta.textContent = `${responsesCount} response${responsesCount === 1 ? "" : "s"} · ${renderInterestStars(project.avg_interest)}`;

      const action = document.createElement("a");
      action.href = `answer.html?project_id=${project.id}`;
      action.className = "x-btn-secondary";
      action.style.fontSize = "0.78rem";
      action.style.marginTop = "0.55rem";
      action.textContent = "Open topic";

      card.appendChild(title);
      card.appendChild(categoryChip);
      card.appendChild(responseMeta);
      card.appendChild(action);
      return card;
    }

    async function fetchTrending() {
      if (!trendingSection || !trendingContainer) return;
      try {
        const { response, data } = await XsoliaApp.apiFetch("/projects/trending?limit=6", {
          auth: Boolean(session && session.accessToken),
          disableAuthRedirect: true,
        });
        if (!response.ok) {
          throw new Error(XsoliaApp.formatApiError(data, "Failed to load trending topics."));
        }
        const rows = Array.isArray(data) ? data : [];
        if (!rows.length) {
          trendingSection.classList.add("hidden");
          return;
        }
        trendingSection.classList.remove("hidden");
        trendingContainer.innerHTML = "";
        rows.forEach((project) => trendingContainer.appendChild(createTrendingCard(project)));
      } catch (_err) {
        trendingSection.classList.add("hidden");
      }
    }

    function renderProjects() {
      container.textContent = "";
      emptyHint.classList.add("hidden");
      errorEl.classList.add("hidden");

      const visible = allProjects.filter((project) => matchesCategory(project, currentMainCategory));
      if (!visible.length) {
        emptyHint.classList.remove("hidden");
        return;
      }

      visible.forEach((project) => {
        container.appendChild(createTopicItem(project));
      });
      XsoliaApp.initMotion();
    }

    function setupFilters() {
      const buttons = document.querySelectorAll("#categoryFilters button[data-main]");
      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          currentMainCategory = button.getAttribute("data-main") || "";
          buttons.forEach((item) => item.classList.remove("filter-pill-active"));
          button.classList.add("filter-pill-active");
          renderProjects();
        });
      });
    }

    async function fetchProjects() {
      container.textContent = "";
      try {
          const params = new URLSearchParams({ limit: "100", offset: "0", sort: filters.sort });
          if (filters.q) params.set("q", filters.q);
          const { response, data } = await XsoliaApp.apiFetch(`/projects/active?${params.toString()}`, {
            auth: Boolean(session && session.accessToken),
            disableAuthRedirect: true,
          });
          if (!response.ok) {
            throw new Error(XsoliaApp.formatApiError(data, "Failed to load topics"));
          }
        allProjects = Array.isArray(data) ? data : [];
        renderProjects();
      } catch (error) {
        errorEl.textContent = error.message || "Failed to load topics.";
        errorEl.classList.remove("hidden");
      }
    }

    async function fetchRespondedProjects() {
      if (!session || session.role !== "tester" || !session.accessToken) return;
      try {
        const cached = sessionStorage.getItem(RESPONDED_CACHE_KEY);
        if (cached) {
          try {
            const parsed = JSON.parse(cached);
            if (parsed && Array.isArray(parsed.ids) && Number(parsed.ts) > 0 && (Date.now() - Number(parsed.ts)) < RESPONDED_CACHE_TTL_MS) {
              parsed.ids.forEach((id) => respondedProjectIds.add(Number(id)));
              return;
            }
          } catch (_parseErr) {
            sessionStorage.removeItem(RESPONDED_CACHE_KEY);
          }
        }
        const { response, data } = await XsoliaApp.apiFetch("/me/responded-project-ids", { auth: true });
        if (!response.ok) return;
        const ids = Array.isArray(data) ? data : [];
        ids.forEach((id) => respondedProjectIds.add(Number(id)));
        sessionStorage.setItem(RESPONDED_CACHE_KEY, JSON.stringify({ ts: Date.now(), ids }));
      } catch (_error) {
        // Non-blocking: list still renders even if this hint fails.
      }
    }

    setupFilters();
    (async () => {
      await fetchRespondedProjects();
      await Promise.all([fetchTrending(), fetchProjects()]);
    })();
  </script>
</body>
</html>
