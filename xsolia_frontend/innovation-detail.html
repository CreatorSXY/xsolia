<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Innovation detail · xSolia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/theme.css?v=20260424-gsap" />
</head>

<body class="min-h-screen flex flex-col">
  <div id="navbar">
    <header class="x-nav sticky top-0 z-50">
      <div class="container h-full flex items-center justify-between gap-4 py-3">
        <a href="index.html" class="flex items-center gap-2">
          <div style="width:32px;height:32px;border-radius:999px;background:linear-gradient(135deg,#ff9ac4,#7dd3fc);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;">k</div>
          <div>
            <div class="site-logo-text">xSolia</div>
            <div class="site-subtitle">Innovation signal</div>
          </div>
        </a>
        <div class="flex-1 flex items-center justify-end gap-4">
          <form id="navSearchForm" class="hidden md:flex items-center gap-2" style="max-width:260px;width:100%;">
            <input id="navSearchInput" type="search" class="x-input" placeholder="Search topics..." style="padding-right:2.2rem;" />
            <button type="submit" style="margin-left:-2.1rem;font-size:0.8rem;color:#9ca3af;">Search</button>
          </form>
          <div id="userInfo" class="flex items-center gap-2" style="font-size:0.8rem;color:#6b7280;">
            <div id="userAvatar" style="width:28px;height:28px;border-radius:999px;background:linear-gradient(135deg,#7dd3fc,#a5b4fc);display:flex;align-items:center;justify-content:center;font-weight:600;color:#fff;text-transform:uppercase;">?</div>
            <div class="flex flex-col">
              <span id="userNameLabel">Guest</span>
              <span id="userRoleLabel" style="font-size:0.7rem;color:#9ca3af;">Not signed in</span>
            </div>
          </div>
        </div>
      </div>
    </header>
  </div>

  <main class="flex-1 container workspace-shell" style="padding-top:1.5rem;padding-bottom:2rem;">
    <section class="section" style="max-width:900px;margin:0 auto;">
      <a href="innovation-explore.html" class="x-btn-secondary motion-reveal" style="font-size:0.8rem;margin-bottom:0.8rem;">Back to pool</a>
      <article class="x-card motion-reveal" style="padding:clamp(1.2rem,3vw,2rem);">
        <p class="eyebrow">Innovation detail</p>
        <h1 id="title" style="font-family:'Instrument Serif',Georgia,serif;font-size:clamp(2.2rem,6vw,4rem);line-height:0.95;letter-spacing:-0.05em;color:var(--ink-strong);margin:0;">Loading...</h1>
        <p id="meta" style="font-size:0.82rem;color:#9ca3af;margin-top:0.6rem;"></p>
        <p id="description" style="font-size:0.98rem;color:#4b5563;margin-top:1rem;white-space:pre-wrap;"></p>
        <div id="tags" class="flex flex-wrap gap-1" style="margin-top:1rem;"></div>
        <div class="flex flex-wrap gap-2" style="margin-top:1.2rem;">
          <button id="voteBtn" type="button" class="x-btn-secondary" style="font-size:0.82rem;">Upvote</button>
          <button id="saveBtn" type="button" class="x-btn-secondary" style="font-size:0.82rem;">Save</button>
          <a id="convertLink" href="#" class="x-btn-primary hidden" style="font-size:0.82rem;">Validate this idea</a>
          <button id="archiveBtn" type="button" class="x-btn-secondary hidden" style="font-size:0.82rem;">Archive idea</button>
        </div>
        <p id="status" style="font-size:0.84rem;color:#6b7280;margin-top:0.8rem;"></p>
        <div style="margin-top:1.1rem; padding-top:1rem; border-top:1px solid rgba(42,39,34,0.1);">
          <div class="flex items-center justify-between gap-2">
            <h2 style="font-size:1rem; font-weight:800; color:var(--ink-strong); margin:0;">Discussion</h2>
            <button id="refreshCommentsBtn" type="button" class="x-btn-secondary" style="font-size:0.78rem;">Refresh</button>
          </div>
          <div id="commentsList" style="margin-top:0.75rem; display:flex; flex-direction:column; gap:0.55rem; font-size:0.86rem; color:#4b5563;"></div>
          <p id="commentsEmpty" class="hidden" style="font-size:0.84rem; color:#9ca3af; margin-top:0.5rem;">No comments yet.</p>
          <form id="commentForm" class="flex flex-wrap gap-2" style="margin-top:0.8rem;">
            <input id="commentInput" class="x-input" placeholder="Share your take on this idea" style="flex:1 1 280px;" />
            <button id="commentSubmitBtn" type="submit" class="x-btn-primary" style="font-size:0.82rem;">Post</button>
          </form>
        </div>
        <p id="error" class="hidden" style="font-size:0.9rem;color:#f97373;margin-top:0.8rem;"></p>
      </article>
    </section>
  </main>

  <footer style="text-align:center;padding:1.5rem 0;font-size:0.75rem;color:var(--ink-faint);">© 2026 xSolia</footer>

  <script src="js/app.js?v=20260424-gsap"></script>
  <script src="js/logo.js"></script>
  <script src="js/nav.js"></script>
  <script>
    const session = XsoliaApp.getSession();
    const params = new URLSearchParams(window.location.search);
    const innovationId = params.get("innovation_id");
    const titleEl = document.getElementById("title");
    const metaEl = document.getElementById("meta");
    const descriptionEl = document.getElementById("description");
    const tagsEl = document.getElementById("tags");
    const voteBtn = document.getElementById("voteBtn");
    const saveBtn = document.getElementById("saveBtn");
    const convertLink = document.getElementById("convertLink");
    const archiveBtn = document.getElementById("archiveBtn");
    const statusEl = document.getElementById("status");
    const commentsListEl = document.getElementById("commentsList");
    const commentsEmptyEl = document.getElementById("commentsEmpty");
    const commentForm = document.getElementById("commentForm");
    const commentInput = document.getElementById("commentInput");
    const commentSubmitBtn = document.getElementById("commentSubmitBtn");
    const refreshCommentsBtn = document.getElementById("refreshCommentsBtn");
    const errorEl = document.getElementById("error");
    let innovation = null;

    if (!innovationId) {
      errorEl.textContent = "Missing innovation_id.";
      errorEl.classList.remove("hidden");
    } else {
      loadInnovation();
    }

    function requireLoginForAction() {
      if (session.userId && session.accessToken) return true;
      window.location.href = "login.html";
      return false;
    }

    async function loadInnovation() {
      try {
        const { response, data } = await XsoliaApp.apiFetch(`/innovations/${innovationId}`);
        if (!response.ok) throw new Error(XsoliaApp.formatApiError(data, "Failed to load innovation."));
        innovation = data;
        renderInnovation(data);
        await loadComments();
      } catch (err) {
        errorEl.textContent = err.message || "Failed to load innovation.";
        errorEl.classList.remove("hidden");
      }
    }

    function renderInnovation(inv) {
      titleEl.textContent = inv.title;
      descriptionEl.textContent = inv.description || "";
      const created = inv.created_at ? new Date(inv.created_at).toLocaleDateString() : "";
      metaEl.textContent = `By user #${inv.author_id}${created ? ` · ${created}` : ""} · ${formatIntent(inv.intent)} · ${inv.upvotes ?? 0} upvotes`;
      voteBtn.textContent = `Upvote · ${inv.upvotes ?? 0}`;
      if (String(inv.author_id) === String(session.userId)) {
        voteBtn.disabled = true;
        voteBtn.title = "You cannot upvote your own idea.";
        archiveBtn.classList.remove("hidden");
      }
      if (session.userId) {
        convertLink.href = `create.html?from_innovation=${inv.id}`;
        convertLink.classList.remove("hidden");
      }
      tagsEl.innerHTML = "";
      (inv.tags || []).forEach((tag) => {
        const link = document.createElement("a");
        link.href = `innovation-explore.html?tag=${encodeURIComponent(tag)}`;
        link.className = "topic-chip";
        link.textContent = tag;
        tagsEl.appendChild(link);
      });
    }

    async function voteInnovation() {
      if (!innovation || !requireLoginForAction()) return;
      voteBtn.disabled = true;
      try {
        const { response, data } = await XsoliaApp.apiFetch(`/innovations/${innovation.id}/vote`, { method: "POST", auth: true });
        if (!response.ok) throw new Error(XsoliaApp.formatApiError(data, "Failed to upvote."));
        innovation.upvotes = data.upvotes;
        voteBtn.textContent = `Upvote · ${data.upvotes}`;
        statusEl.textContent = "Vote recorded.";
      } catch (err) {
        statusEl.textContent = err.message || "Failed to upvote.";
      } finally {
        if (String(innovation.author_id) !== String(session.userId)) voteBtn.disabled = false;
      }
    }

    async function saveInnovation() {
      if (!innovation || !requireLoginForAction()) return;
      saveBtn.disabled = true;
      try {
        const { response, data } = await XsoliaApp.apiFetch(`/innovations/${innovation.id}/save`, { method: "POST", auth: true });
        if (!response.ok) throw new Error(XsoliaApp.formatApiError(data, "Failed to save."));
        saveBtn.textContent = data.saved ? "Saved" : "Save";
        statusEl.textContent = "Saved to your innovation list.";
      } catch (err) {
        statusEl.textContent = err.message || "Failed to save.";
      } finally {
        saveBtn.disabled = false;
      }
    }

    async function archiveInnovation() {
      if (!innovation || !requireLoginForAction()) return;
      if (!confirm("Archive this idea? It will disappear from the public pool.")) return;
      archiveBtn.disabled = true;
      try {
        const { response, data } = await XsoliaApp.apiFetch(`/innovations/${innovation.id}/status`, {
          method: "PATCH",
          auth: true,
          body: { status: "archived" },
        });
        if (!response.ok) throw new Error(XsoliaApp.formatApiError(data, "Failed to archive."));
        statusEl.textContent = "Idea archived.";
        archiveBtn.textContent = "Archived";
      } catch (err) {
        statusEl.textContent = err.message || "Failed to archive.";
        archiveBtn.disabled = false;
      }
    }

    async function loadComments() {
      commentsListEl.innerHTML = "";
      commentsEmptyEl.classList.add("hidden");
      try {
        const { response, data } = await XsoliaApp.apiFetch(`/innovations/${innovationId}/comments?limit=50&offset=0`);
        if (!response.ok) throw new Error(XsoliaApp.formatApiError(data, "Failed to load comments."));
        const comments = Array.isArray(data) ? data : [];
        if (!comments.length) {
          commentsEmptyEl.classList.remove("hidden");
          return;
        }
        comments.forEach((comment) => commentsListEl.appendChild(createCommentItem(comment)));
      } catch (err) {
        commentsEmptyEl.textContent = err.message || "Comments unavailable.";
        commentsEmptyEl.classList.remove("hidden");
      }
    }

    function createCommentItem(comment) {
      const item = document.createElement("div");
      item.style.borderLeft = "2px solid rgba(215,98,53,0.35)";
      item.style.paddingLeft = "0.65rem";

      const meta = document.createElement("div");
      meta.style.fontSize = "0.74rem";
      meta.style.color = "#9ca3af";
      const created = comment.created_at ? new Date(comment.created_at).toLocaleDateString() : "";
      const author = comment.author_name || `User #${comment.author_id}`;
      meta.textContent = `${author}${created ? ` · ${created}` : ""}`;

      const text = document.createElement("div");
      text.textContent = comment.text || "";

      item.appendChild(meta);
      item.appendChild(text);
      return item;
    }

    async function submitComment(event) {
      event.preventDefault();
      const text = commentInput.value.trim();
      if (!text) return;
      if (!requireLoginForAction()) return;
      commentSubmitBtn.disabled = true;
      try {
        const { response, data } = await XsoliaApp.apiFetch(`/innovations/${innovationId}/comments`, {
          method: "POST",
          auth: true,
          body: { text },
        });
        if (!response.ok) throw new Error(XsoliaApp.formatApiError(data, "Failed to post comment."));
        commentInput.value = "";
        await loadComments();
        statusEl.textContent = "Comment posted.";
      } catch (err) {
        statusEl.textContent = err.message || "Failed to post comment.";
      } finally {
        commentSubmitBtn.disabled = false;
      }
    }

    function formatIntent(intent) {
      switch (intent) {
        case "looking_for_team": return "Looking for collaborators";
        case "just_idea": return "Free to take";
        case "open":
        default: return "Just sharing";
      }
    }

    voteBtn.addEventListener("click", voteInnovation);
    saveBtn.addEventListener("click", saveInnovation);
    archiveBtn.addEventListener("click", archiveInnovation);
    refreshCommentsBtn.addEventListener("click", loadComments);
    commentForm.addEventListener("submit", submitComment);
  </script>
</body>
</html>
