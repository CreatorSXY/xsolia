<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login · xsolia.com</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/theme.css">
</head>

<body class="min-h-screen flex flex-col">
  <!-- Shared navbar -->
  <div id="navbar">
    <header class="x-nav sticky top-0 z-50">
      <div class="container h-full flex items-center justify-between gap-4 py-3">
        <!-- Logo + site name -->
        <a href="index.html" class="flex items-center gap-2">
          <div
            style="
              width: 32px;
              height: 32px;
              border-radius: 999px;
              background: linear-gradient(135deg, #ff9ac4, #7dd3fc);
              display: flex;
              align-items: center;
              justify-content: center;
              font-weight: 700;
              color: #fff;
            "
          >
            k
          </div>
          <div>
            <div class="site-logo-text">xsolia.com</div>
            <div class="site-subtitle">Early validation playground</div>
          </div>
        </a>

        <!-- Right side: search + user -->
        <div class="flex-1 flex items-center justify-end gap-4">
          <!-- Search bar -->
          <form
            id="navSearchForm"
            class="hidden md:flex items-center gap-2"
            style="max-width: 260px; width: 100%;"
          >
            <input
              id="navSearchInput"
              type="search"
              class="x-input"
              placeholder="Search topics…"
              style="padding-right: 2.2rem;"
            />
            <button
              type="submit"
              style="
                margin-left: -2.1rem;
                font-size: 0.8rem;
                color: #9ca3af;
              "
            >
              🔍
            </button>
          </form>

          <!-- User info -->
          <div
            id="userInfo"
            class="flex items-center gap-2"
            style="font-size: 0.8rem; color: #6b7280;"
          >
            <div
              id="userAvatar"
              style="
                width: 28px;
                height: 28px;
                border-radius: 999px;
                background: linear-gradient(135deg, #7dd3fc, #a5b4fc);
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 600;
                color: #fff;
                text-transform: uppercase;
              "
            >
              ?
            </div>
            <div class="flex flex-col">
              <span id="userNameLabel">Guest</span>
              <span id="userRoleLabel" style="font-size: 0.7rem; color: #9ca3af;">
                Not signed in
              </span>
            </div>
          </div>
        </div>
      </div>
    </header>
  </div>

  <main class="flex-1 flex items-center justify-center p-4">
    <div class="x-card" style="width:100%; max-width:380px;">
      <h1 style="font-size:1.4rem; font-weight:600; margin-bottom:0.6rem; text-align:center;">
        Log in
      </h1>
      <p style="font-size:0.85rem; color:#6b7280; text-align:center; margin-bottom:1rem;">
        Use the email and password you registered with.
      </p>

      <form id="loginForm" class="space-y-4">
        <div>
          <label style="font-size:0.85rem; color:#6b7280;">Email</label>
          <input id="email" type="email" required class="x-input" />
        </div>

        <div>
          <label style="font-size:0.85rem; color:#6b7280;">Password</label>
          <input id="password" type="password" required class="x-input" />
        </div>

        <button type="submit" class="x-btn-primary" style="width:100%; justify-content:center;">
          Continue
        </button>
      </form>

      <p id="error" style="font-size:0.85rem; color:#f97373; margin-top:0.75rem; display:none;"></p>

      <p style="font-size:0.8rem; color:#6b7280; margin-top:1rem; text-align:center;">
        Don’t have an account?
        <a id="registerLink" href="register.html" style="color:#2563eb;">Sign up</a>
      </p>
    </div>
  </main>

  <footer style="text-align:center; padding:1.5rem 0; font-size:0.75rem; color:#9ca3af;">
    © 2025 xsolia.com
  </footer>

  <script src="js/app.js"></script>
  <script src="js/nav.js"></script>
  <script>
    // Preselect role for registration link
    const params = new URLSearchParams(window.location.search);
    const roleParam = params.get('role');
    const registerLink = document.getElementById('registerLink');
    if (roleParam) {
      registerLink.href = `register.html?role=${roleParam}`;
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const { response, data } = await XsoliaApp.apiFetch('/login', {
        method: 'POST',
        body: { email, password }
      });
      const errorEl = document.getElementById('error');

      if (!response.ok) {
        errorEl.textContent = data.detail || 'Login failed';
        errorEl.style.display = 'block';
      } else {
        XsoliaApp.setSession(data);

        if (data.role === 'creator') {
          window.location.href = 'creator-dashboard.html';
        } else {
          window.location.href = 'tester-dashboard.html';
        }
      }
    });
  </script>
</body>
</html>
