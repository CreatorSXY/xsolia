<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Provide Feedback · xSolia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/theme.css?v=20260424-gsap">
</head>

<body class="min-h-screen flex flex-col">
  <!-- Shared navbar -->
  <div id="navbar">
    <header class="x-nav sticky top-0 z-50">
      <div class="container h-full flex items-center justify-between gap-4 py-3">
        <!-- Logo + site name -->
        <a href="index.html" class="flex items-center gap-2">
          <div
            style="
              width: 32px;
              height: 32px;
              border-radius: 999px;
              background: linear-gradient(135deg, #ff9ac4, #7dd3fc);
              display: flex;
              align-items: center;
              justify-content: center;
              font-weight: 700;
              color: #fff;
            "
          >
            k
          </div>
          <div>
            <div class="site-logo-text">xSolia</div>
            <div class="site-subtitle">Early validation playground</div>
          </div>
        </a>

        <!-- Right side: search + user -->
        <div class="flex-1 flex items-center justify-end gap-4">
          <!-- Search bar -->
          <form
            id="navSearchForm"
            class="hidden md:flex items-center gap-2"
            style="max-width: 260px; width: 100%;"
          >
            <input
              id="navSearchInput"
              type="search"
              class="x-input"
              placeholder="Search topics…"
              style="padding-right: 2.2rem;"
            />
            <button
              type="submit"
              style="
                margin-left: -2.1rem;
                font-size: 0.8rem;
                color: #9ca3af;
              "
            >
              🔍
            </button>
          </form>

          <!-- User info -->
          <div
            id="userInfo"
            class="flex items-center gap-2"
            style="font-size: 0.8rem; color: #6b7280;"
          >
            <div
              id="userAvatar"
              style="
                width: 28px;
                height: 28px;
                border-radius: 999px;
                background: linear-gradient(135deg, #7dd3fc, #a5b4fc);
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 600;
                color: #fff;
                text-transform: uppercase;
              "
            >
              ?
            </div>
            <div class="flex flex-col">
              <span id="userNameLabel">Guest</span>
              <span id="userRoleLabel" style="font-size: 0.7rem; color: #9ca3af;">
                Not signed in
              </span>
            </div>
          </div>
        </div>
      </div>
    </header>
  </div>

  <!-- Main Content -->
  <main class="flex-1 container form-shell" style="padding-top:1.5rem; padding-bottom:2rem;">
    <section class="section" style="width:100%; max-width:680px; margin:0 auto;">
      <div class="x-card form-panel motion-reveal" id="wrapper">
        <div style="margin-bottom:1rem;">
          <h1 id="projTitle" style="font-size:1.4rem; font-weight:600; margin-bottom:0.25rem;">Loading...</h1>
          <p id="projDesc" style="font-size:0.9rem; color:#4b5563; margin-bottom:0.25rem;"></p>
          <p id="projMeta" style="font-size:0.8rem; color:#6b7280;"></p>
          <div id="guestBanner" class="hidden" style="margin-top:0.55rem; padding:0.55rem 0.7rem; border-radius:10px; border:1px solid rgba(29,78,216,0.25); background:rgba(37,99,235,0.08); color:#1d4ed8; font-size:0.82rem;">
            You&apos;re answering as a guest. Create a free account after submitting to track your contributions.
          </div>
          <div id="rewardBanner" class="hidden" style="margin-top:0.55rem; padding:0.55rem 0.7rem; border-radius:10px; font-size:0.82rem;"></div>
          <div id="projImages" style="display:grid; grid-template-columns:repeat(3, minmax(0, 1fr)); gap:0.5rem; margin-top:0.7rem;"></div>
        </div>

        <form id="answerForm" class="space-y-4 hidden">
          <!-- Interest Level -->
          <div>
            <label style="font-size:0.85rem; color:#374151;">Your interest in this idea (1–5)</label>
            <select id="interest" class="x-input" style="max-width:260px; margin-top:0.25rem;">
              <option value="5">5 - Very interested, would consider paying</option>
              <option value="4">4 - Quite interested</option>
              <option value="3">3 - Somewhat interested</option>
              <option value="2">2 - Not very interested</option>
              <option value="1">1 - Not interested at all</option>
            </select>
            <span id="err-interest" style="display:none; font-size:0.75rem; color:#f97373;"></span>
          </div>

          <!-- Dynamic question fields -->
          <div>
            <label style="font-size:0.85rem; color:#374151; display:block; margin-bottom:0.25rem;">
              Questions from the creator
            </label>
            <div id="questionsContainer" class="space-y-3"></div>
            <span id="err-answers" style="display:none; font-size:0.75rem; color:#f97373;"></span>
          </div>

          <!-- Price range (optional) -->
          <div>
            <label style="font-size:0.85rem; color:#374151;">What price range would you consider? (optional, USD)</label>
            <div style="display:flex; gap:0.5rem; align-items:center; margin-top:0.25rem;">
              <input
                id="priceMin"
                type="number"
                min="0"
                placeholder="Min"
                class="x-input"
                style="max-width:120px;"
              />
              <span style="font-size:0.85rem; color:#6b7280;">~</span>
              <input
                id="priceMax"
                type="number"
                min="0"
                placeholder="Max"
                class="x-input"
                style="max-width:120px;"
              />
            </div>
            <span id="err-priceMin" style="display:none; font-size:0.75rem; color:#f97373;"></span>
            <span id="err-priceMax" style="display:none; font-size:0.75rem; color:#f97373;"></span>
          </div>

          <button
            type="submit"
            class="x-btn-primary"
            style="width:100%; justify-content:center; margin-top:0.5rem;"
          >
            Submit feedback
          </button>
        </form>

        <p id="error" style="font-size:0.85rem; color:#f97373; margin-top:0.75rem; display:none;"></p>
        <p id="success" style="font-size:0.85rem; color:#16a34a; margin-top:0.75rem; display:none;"></p>
        <div id="guestConvertPanel" class="hidden" style="margin-top:0.9rem; border:1px solid rgba(42,39,34,0.14); border-radius:12px; padding:0.8rem;">
          <h3 style="font-size:1rem; font-weight:700; margin-bottom:0.2rem;">Your feedback was submitted!</h3>
          <p style="font-size:0.82rem; color:#6b7280; margin-bottom:0.6rem;">
            Create a free account to track your contributions and compete for early access.
          </p>
          <form id="guestConvertForm" class="space-y-3">
            <div>
              <label style="font-size:0.8rem; color:#6b7280;">Name</label>
              <input id="guestName" type="text" class="x-input" />
            </div>
            <div>
              <label style="font-size:0.8rem; color:#6b7280;">Email</label>
              <input id="guestEmail" type="email" class="x-input" />
            </div>
            <div>
              <label style="font-size:0.8rem; color:#6b7280;">Password</label>
              <input id="guestPassword" type="password" class="x-input" />
            </div>
            <button type="submit" class="x-btn-primary" style="width:100%; justify-content:center;">Create account &amp; save my response</button>
          </form>
          <button id="skipGuestConvertBtn" type="button" class="x-btn-secondary" style="margin-top:0.55rem; width:100%; justify-content:center;">
            Skip — continue as guest
          </button>
          <p id="guestConvertError" style="font-size:0.82rem; color:#f97373; margin-top:0.55rem; display:none;"></p>
        </div>
      </div>
    </section>
  </main>

  <footer style="text-align:center; padding:1.5rem 0; font-size:0.75rem; color:var(--ink-faint);">
    © 2026 xSolia
  </footer>

  <script src="js/app.js?v=20260424-gsap"></script>
  <script src="js/logo.js"></script>
  <script src="js/nav.js"></script>
  <script>
    const session = XsoliaApp.getSession();
    const params = new URLSearchParams(window.location.search);
    const shareToken = (params.get('token') || '').trim();
    const projectIdParam = (params.get('project_id') || params.get('id') || '').trim();
    let resolvedProjectId = projectIdParam || null;
    let currentProject = null;
    let latestGuestResponseId = null;

    const isGuestSession = !session.userId || !session.accessToken;
    const isGuestMode = Boolean(shareToken) && isGuestSession;

    if (!resolvedProjectId && !shareToken) {
      alert('Missing project reference. Please access from the topic list.');
      window.location.href = 'explore.html';
    }

    async function loadProject() {
      const titleEl = document.getElementById('projTitle');
      const descEl = document.getElementById('projDesc');
      const metaEl = document.getElementById('projMeta');
      const imagesEl = document.getElementById('projImages');
      const formEl = document.getElementById('answerForm');
      const qsContainer = document.getElementById('questionsContainer');
      const errorEl = document.getElementById('error');
      const rewardBannerEl = document.getElementById('rewardBanner');
      const guestBannerEl = document.getElementById('guestBanner');

      try {
          const endpoint = shareToken && !resolvedProjectId
            ? `/projects/by-token/${encodeURIComponent(shareToken)}`
            : `/projects/${encodeURIComponent(resolvedProjectId)}`;
          const { response, data } = await XsoliaApp.apiFetch(endpoint, {
            auth: Boolean(session && session.accessToken),
            disableAuthRedirect: true,
          });
          if (response.status === 401 || response.status === 403) {
            throw new Error('This validation topic is private or tester-only. Please log in with the right account to continue.');
          }
          if (!response.ok) {
            throw new Error(XsoliaApp.formatApiError(data, 'Failed to load project'));
          }

		        const proj = data;
          currentProject = proj;
          resolvedProjectId = String(proj.id);
        if (!proj.allow_indexing) {
          const meta = document.createElement('meta');
          meta.name = 'robots';
          meta.content = 'noindex, nofollow';
          document.head.appendChild(meta);
        }

		        titleEl.textContent = proj.title;
        descEl.textContent = proj.description || '';
        metaEl.textContent = `Target: ${proj.target_audience || 'Not specified'} · Budget: $${proj.budget || 0}`;
        rewardBannerEl.classList.add('hidden');
        rewardBannerEl.textContent = '';
        rewardBannerEl.style.border = '';
        rewardBannerEl.style.background = '';
        rewardBannerEl.style.color = '';
        if (proj.reward_type === 'early_access') {
          rewardBannerEl.textContent = 'Answer to compete for early access to this product';
          rewardBannerEl.style.border = '1px solid rgba(215,98,53,0.32)';
          rewardBannerEl.style.background = 'rgba(215,98,53,0.12)';
          rewardBannerEl.style.color = '#7c2d12';
          rewardBannerEl.classList.remove('hidden');
        } else if (proj.reward_note) {
          rewardBannerEl.textContent = `Reward: ${proj.reward_note}`;
          rewardBannerEl.style.border = '1px solid rgba(42,39,34,0.16)';
          rewardBannerEl.style.background = 'rgba(255,255,255,0.66)';
          rewardBannerEl.style.color = '#4b5563';
          rewardBannerEl.classList.remove('hidden');
        }
        guestBannerEl.classList.toggle('hidden', !isGuestMode);
        imagesEl.innerHTML = '';
        const imageUrls = Array.isArray(proj.image_urls) ? proj.image_urls : [];
        imageUrls.slice(0, 3).forEach((url, index) => {
          const image = document.createElement('img');
          image.src = url;
          image.alt = `${proj.title || 'Topic'} image ${index + 1}`;
          image.style.width = '100%';
          image.style.height = '102px';
          image.style.objectFit = 'cover';
          image.style.borderRadius = '10px';
          image.style.border = '1px solid rgba(42,39,34,0.16)';
          image.style.display = 'block';
          imagesEl.appendChild(image);
        });

        qsContainer.innerHTML = '';
        if (proj.questions && proj.questions.length > 0) {
          proj.questions.forEach((q, idx) => {
            const block = document.createElement('div');

            const label = document.createElement('label');
            label.style.fontSize = '0.85rem';
            label.style.color = '#374151';
            label.style.display = 'block';
            label.style.marginBottom = '0.25rem';
            label.textContent = `Q${idx + 1}. ${q}`;

            const ta = document.createElement('textarea');
            ta.className = 'x-textarea';
            ta.rows = 3;
            ta.dataset.qindex = idx;

            block.appendChild(label);
            block.appendChild(ta);
            qsContainer.appendChild(block);
          });
        }

        formEl.classList.remove('hidden');
      } catch (err) {
        errorEl.textContent = err.message || 'Error loading project details.';
        errorEl.style.display = 'block';
      }
    }

    loadProject();

    const ANSWER_FIELD_MAP = {
      interest: 'interest_level',
      answers: 'answers',
      priceMin: 'price_min',
      priceMax: 'price_max',
    };

    function clearAnswerFormErrors() {
      document.querySelectorAll('[id^="err-"]').forEach((el) => {
        el.textContent = '';
        el.style.display = 'none';
      });
      ['interest', 'priceMin', 'priceMax'].forEach((id) => {
        const input = document.getElementById(id);
        if (input) input.style.outline = '';
      });
      document.getElementById('questionsContainer').style.outline = '';
    }

    function applyAnswerFieldErrors(fieldErrors) {
      Object.entries(ANSWER_FIELD_MAP).forEach(([elementId, fieldKey]) => {
        const message = fieldErrors[fieldKey] || '';
        const errorNode = document.getElementById(`err-${elementId}`);
        const input = document.getElementById(elementId);

        if (errorNode) {
          errorNode.textContent = message;
          errorNode.style.display = message ? 'block' : 'none';
        }
        if (input) {
          input.style.outline = message ? '1.5px solid #f97373' : '';
        }
      });

      const answersError = fieldErrors.answers || '';
      document.getElementById('questionsContainer').style.outline = answersError ? '1.5px solid #f97373' : '';
    }

    function showGuestConversionPrompt() {
      const panel = document.getElementById('guestConvertPanel');
      const successEl = document.getElementById('success');
      successEl.textContent = 'Your feedback was submitted!';
      successEl.style.display = 'block';
      if (panel) {
        panel.classList.remove('hidden');
      }
    }

    async function convertGuestResponseToAccount() {
      const convertError = document.getElementById('guestConvertError');
      const name = document.getElementById('guestName').value.trim();
      const email = document.getElementById('guestEmail').value.trim().toLowerCase();
      const password = document.getElementById('guestPassword').value;
      convertError.style.display = 'none';

      if (!name || !email || !password) {
        convertError.textContent = 'Please complete name, email, and password.';
        convertError.style.display = 'block';
        return;
      }

      const payload = {
        name,
        email,
        password,
        guest_response_ids: latestGuestResponseId ? [latestGuestResponseId] : [],
      };

      const form = document.getElementById('guestConvertForm');
      const submitBtn = form ? form.querySelector('button[type="submit"]') : null;
      const originalText = submitBtn ? submitBtn.textContent : '';
      if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Creating account...';
      }

      try {
        const { response, data } = await XsoliaApp.apiFetch('/register/from-guest', {
          method: 'POST',
          body: payload,
          disableAuthRedirect: true,
        });
        if (!response.ok) {
          convertError.textContent = XsoliaApp.formatApiError(data, 'Failed to create account.');
          convertError.style.display = 'block';
          return;
        }
        XsoliaApp.setSession(data);
        try {
          sessionStorage.removeItem('xsolia_responded_projects_cache_v1');
        } catch (_err) {
          // Non-blocking cache cleanup.
        }
        window.location.href = 'tester-dashboard.html?welcome=1';
      } catch (err) {
        convertError.textContent = err.message || 'Failed to create account.';
        convertError.style.display = 'block';
      } finally {
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = originalText || 'Create account & save my response';
        }
      }
    }

    const guestConvertForm = document.getElementById('guestConvertForm');
    if (guestConvertForm) {
      guestConvertForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        await convertGuestResponseToAccount();
      });
    }

    const skipGuestConvertBtn = document.getElementById('skipGuestConvertBtn');
    if (skipGuestConvertBtn) {
      skipGuestConvertBtn.addEventListener('click', () => {
        const panel = document.getElementById('guestConvertPanel');
        const successEl = document.getElementById('success');
        if (panel) panel.classList.add('hidden');
        successEl.innerHTML = 'Thank you for your feedback! <a href="register.html" style="color:#2563eb;">Sign up later</a>.';
        successEl.style.display = 'block';
      });
    }

    // Submit feedback
    document.getElementById('answerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const interest = Number(document.getElementById('interest').value);
      const priceMinStr = document.getElementById('priceMin').value.trim();
      const priceMaxStr = document.getElementById('priceMax').value.trim();

      const answerTexts = [];
      document.querySelectorAll('#questionsContainer textarea').forEach((ta) => {
        answerTexts.push(ta.value.trim());
      });

      const payload = {
        interest_level: interest,
        answers: answerTexts,
        price_min: priceMinStr ? Number(priceMinStr) : null,
        price_max: priceMaxStr ? Number(priceMaxStr) : null
      };

      const errorEl = document.getElementById('error');
      const successEl = document.getElementById('success');
      errorEl.style.display = 'none';
      successEl.style.display = 'none';
      clearAnswerFormErrors();

      const clientErrors = {};
      if (!isGuestMode && (!session.userId || !session.accessToken)) {
        errorEl.textContent = 'This validation topic is private or tester-only. Please log in with the right account to continue.';
        errorEl.style.display = 'block';
        setTimeout(() => {
          window.location.href = `login.html?next=${encodeURIComponent(window.location.pathname + window.location.search)}`;
        }, 900);
        return;
      }
      if (!isGuestMode && session.role !== 'tester') {
        errorEl.textContent = 'Only tester accounts can submit feedback.';
        errorEl.style.display = 'block';
        return;
      }
      if (interest < 1 || interest > 5) clientErrors.interest_level = 'Interest must be between 1 and 5.';
      if (!answerTexts.some(Boolean)) clientErrors.answers = 'Please answer at least one question.';
      else if (answerTexts.some((answer) => answer.length > 3000)) clientErrors.answers = 'Each answer must be 3000 characters or fewer.';
      const priceMinValue = Number(priceMinStr);
      const priceMaxValue = Number(priceMaxStr);
      if (priceMinStr && Number.isNaN(priceMinValue)) clientErrors.price_min = 'Minimum price must be a number.';
      else if (priceMinStr && priceMinValue < 0) clientErrors.price_min = 'Minimum price cannot be negative.';
      if (priceMaxStr && Number.isNaN(priceMaxValue)) clientErrors.price_max = 'Maximum price must be a number.';
      else if (priceMaxStr && priceMaxValue < 0) clientErrors.price_max = 'Maximum price cannot be negative.';
      if (priceMinStr && priceMaxStr && !Number.isNaN(priceMinValue) && !Number.isNaN(priceMaxValue) && priceMinValue > priceMaxValue) {
        clientErrors.price_min = 'Minimum price cannot be greater than maximum price.';
        clientErrors.price_max = 'Maximum price must be greater than minimum price.';
      }
      if (Object.keys(clientErrors).length > 0) {
        applyAnswerFieldErrors(clientErrors);
        errorEl.textContent = 'Please fix the errors above.';
        errorEl.style.display = 'block';
        return;
      }

      try {
        const respondPath = `/projects/${encodeURIComponent(resolvedProjectId)}/respond${shareToken ? `?share_token=${encodeURIComponent(shareToken)}` : ''}`;
        const { response, data } = await XsoliaApp.apiFetch(respondPath, {
          method: 'POST',
          auth: !isGuestSession,
          disableAuthRedirect: true,
          body: payload
          });
          if (!response.ok) {
            errorEl.textContent = XsoliaApp.formatApiError(data, 'Failed to submit feedback.');
            errorEl.style.display = 'block';
            applyAnswerFieldErrors(XsoliaApp.getFieldErrors(data));
            return;
          }
          latestGuestResponseId = data && data.response_id ? Number(data.response_id) : null;

          if (isGuestMode) {
            showGuestConversionPrompt();
            return;
          }

          if (currentProject && currentProject.reward_type === 'early_access') {
            successEl.textContent = "You're in the running — the creator will review top contributors.";
          } else {
            successEl.textContent = 'Thank you for your feedback! Returning to the topic list in 3 seconds.';
          }
          successEl.style.display = 'block';
          try {
            localStorage.setItem('tester_first_response_submitted', '1');
          } catch (_err) {
            // Non-blocking local hint.
          }
          try {
            sessionStorage.removeItem('xsolia_responded_projects_cache_v1');
          } catch (_err) {
            // Non-blocking cache cleanup.
          }

	        setTimeout(() => {
	          window.location.href = 'explore.html';
        }, 3000);
      } catch (err) {
        errorEl.textContent = err.message || 'An error occurred during submission.';
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
