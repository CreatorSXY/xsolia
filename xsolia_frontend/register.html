<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Register · xSolia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/theme.css?v=20260424-gsap">
</head>
<body class="min-h-screen flex flex-col">
  <!-- Shared navbar -->
  <div id="navbar">
    <header class="x-nav sticky top-0 z-50">
      <div class="container h-full flex items-center justify-between gap-4 py-3">
        <!-- Logo + site name -->
        <a href="index.html" class="flex items-center gap-2">
          <div
            style="
              width: 32px;
              height: 32px;
              border-radius: 999px;
              background: linear-gradient(135deg, #ff9ac4, #7dd3fc);
              display: flex;
              align-items: center;
              justify-content: center;
              font-weight: 700;
              color: #fff;
            "
          >
            k
          </div>
          <div>
            <div class="site-logo-text">xSolia</div>
            <div class="site-subtitle">Early validation playground</div>
          </div>
        </a>

        <!-- Right side: search + user -->
        <div class="flex-1 flex items-center justify-end gap-4">
          <!-- Search bar -->
          <form
            id="navSearchForm"
            class="hidden md:flex items-center gap-2"
            style="max-width: 260px; width: 100%;"
          >
            <input
              id="navSearchInput"
              type="search"
              class="x-input"
              placeholder="Search topics…"
              style="padding-right: 2.2rem;"
            />
            <button
              type="submit"
              style="
                margin-left: -2.1rem;
                font-size: 0.8rem;
                color: #9ca3af;
              "
            >
              🔍
            </button>
          </form>

          <!-- User info -->
          <div
            id="userInfo"
            class="flex items-center gap-2"
            style="font-size: 0.8rem; color: #6b7280;"
          >
            <div
              id="userAvatar"
              style="
                width: 28px;
                height: 28px;
                border-radius: 999px;
                background: linear-gradient(135deg, #7dd3fc, #a5b4fc);
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 600;
                color: #fff;
                text-transform: uppercase;
              "
            >
              ?
            </div>
            <div class="flex flex-col">
              <span id="userNameLabel">Guest</span>
              <span id="userRoleLabel" style="font-size: 0.7rem; color: #9ca3af;">
                Not signed in
              </span>
            </div>
          </div>
        </div>
      </div>
    </header>
  </div>

  <main class="flex-1 auth-shell p-4">
    <div class="x-card auth-panel motion-reveal" style="width:100%; max-width:420px;">
      <h1 style="font-size:1.4rem; font-weight:600; margin-bottom:0.6rem; text-align:center;">Create an account</h1>
      <p style="font-size:0.85rem; color:#6b7280; text-align:center; margin-bottom:1rem;">
        Choose your role below. Creators can upgrade later anytime.
      </p>
      <form id="regForm" class="space-y-4" novalidate>
        <div>
          <label style="font-size:0.85rem; color:#6b7280;">Name</label>
          <input id="name" type="text" required class="x-input" />
          <span id="err-name" style="display:none; font-size:0.75rem; color:#f97373;"></span>
        </div>
        <div>
          <label style="font-size:0.85rem; color:#6b7280;">Email</label>
          <input id="email" type="email" required class="x-input" />
          <span id="err-email" style="display:none; font-size:0.75rem; color:#f97373;"></span>
        </div>
        <div>
          <label style="font-size:0.85rem; color:#6b7280;">Password</label>
          <input id="password" type="password" required class="x-input" />
          <span id="err-password" style="display:none; font-size:0.75rem; color:#f97373;"></span>
        </div>
        <div>
          <label style="font-size:0.85rem; color:#6b7280;">Sign up as</label>
          <select id="role" class="x-input">
            <option value="tester">Early Tester</option>
            <option value="creator">Creator</option>
          </select>
          <span id="err-role" style="display:none; font-size:0.75rem; color:#f97373;"></span>
        </div>
        <div id="subscriptionWrap" class="hidden">
          <label style="font-size:0.85rem; color:#6b7280;">Subscription plan</label>
          <select id="subscription" class="x-input">
            <option value="free">Read Only (Free)</option>
            <option value="creator_basic">Creator Basic — $15/mo</option>
            <option value="creator_plus">Creator Plus — $20/mo</option>
          </select>
          <span id="err-subscription" style="display:none; font-size:0.75rem; color:#f97373;"></span>
          <p style="font-size:0.75rem; color:#9ca3af; margin-top:0.25rem;">
            You can change your plan anytime in your dashboard.
          </p>
        </div>
        <button type="submit" class="x-btn-primary" style="width:100%; justify-content:center;">
          Register
        </button>
      </form>
      <p id="error" style="font-size:0.85rem; color:#f97373; margin-top:0.75rem; display:none;"></p>
      <p style="font-size:0.8rem; color:#6b7280; margin-top:1rem; text-align:center;">
        Already have an account?
        <a href="login.html" style="color:#2563eb;">Log in</a>
      </p>
    </div>
  </main>

  <footer style="text-align:center; padding:1.5rem 0; font-size:0.75rem; color:var(--ink-faint);">
    © 2026 xSolia
  </footer>

  <script src="js/app.js?v=20260424-gsap"></script>
  <script src="js/logo.js"></script>
  <script src="js/nav.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const presetRole = params.get('role');
    const roleSelect = document.getElementById('role');
    if (presetRole) {
      roleSelect.value = presetRole;
    }

    const subscriptionWrap = document.getElementById('subscriptionWrap');
    const subscriptionSelect = document.getElementById('subscription');

    function updateSubscriptionVisibility() {
      if (roleSelect.value === 'creator') {
        subscriptionWrap.classList.remove('hidden');
      } else {
        subscriptionWrap.classList.add('hidden');
        subscriptionSelect.value = 'free';
      }
    }
    roleSelect.addEventListener('change', updateSubscriptionVisibility);
    updateSubscriptionVisibility();

    function clearRegisterFieldErrors() {
      ['name', 'email', 'password', 'role', 'subscription'].forEach((id) => {
        const errorNode = document.getElementById(`err-${id}`);
        const input = document.getElementById(id);
        if (errorNode) {
          errorNode.textContent = '';
          errorNode.style.display = 'none';
        }
        if (input) input.style.outline = '';
      });
    }

    function applyRegisterFieldErrors(fieldErrors) {
      ['name', 'email', 'password', 'role', 'subscription'].forEach((id) => {
        const message = fieldErrors[id] || '';
        const errorNode = document.getElementById(`err-${id}`);
        const input = document.getElementById(id);
        if (errorNode) {
          errorNode.textContent = message;
          errorNode.style.display = message ? 'block' : 'none';
        }
        if (input) input.style.outline = message ? '1.5px solid #f97373' : '';
      });
    }

    document.getElementById('regForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const role = roleSelect.value;
      const subscription = subscriptionSelect.value;
      const errorEl = document.getElementById('error');
      const submitBtn = e.target.querySelector('button[type="submit"]');
      const originalText = submitBtn ? submitBtn.textContent : 'Register';
      errorEl.style.display = 'none';
      clearRegisterFieldErrors();

      const clientErrors = {};
      const cleanName = name.trim();
      const cleanEmail = email.trim().toLowerCase();
      if (cleanName.length < 2) clientErrors.name = 'Name is too short.';
      else if (cleanName.length > 64) clientErrors.name = 'Name is too long.';
      if (!cleanEmail) clientErrors.email = 'Email is required.';
      else if (!cleanEmail.includes('@')) clientErrors.email = 'Invalid email.';
      if (password.length < 8) clientErrors.password = 'Password must be at least 8 characters.';
      else if (password.length > 128) clientErrors.password = 'Password is too long.';
      if (!['tester', 'creator'].includes(role)) clientErrors.role = 'Invalid role.';
      if (!['free', 'creator_basic', 'creator_plus'].includes(subscription)) clientErrors.subscription = 'Invalid subscription plan.';
      if (Object.keys(clientErrors).length > 0) {
        applyRegisterFieldErrors(clientErrors);
        errorEl.textContent = 'Please fix the errors above.';
        errorEl.style.display = 'block';
        return;
      }

      const payload = { name: cleanName, email: cleanEmail, password, role, subscription };

      if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Please wait...';
      }

      try {
        const { response, data } = await XsoliaApp.apiFetch('/register', {
          method: 'POST',
          body: payload
        });
        if (!response.ok) {
          errorEl.textContent = XsoliaApp.formatApiError(data, 'Registration failed');
          errorEl.style.display = 'block';
          applyRegisterFieldErrors(XsoliaApp.getFieldErrors(data));
        } else {
          window.location.href = 'login.html';
        }
      } finally {
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
        }
      }
    });
  </script>
</body>
</html>
